<header
  class="sticky top-0 z-30 h-16 flex items-center
         bg-white/90 dark:bg-gray-950/95 backdrop-blur-md
         border-b border-gray-200/60 dark:border-gray-800/60
         transition-colors duration-300"
>
  <div class="flex items-center justify-between w-full px-4 sm:px-6">

    <!-- Left: Hamburger + Breadcrumb -->
    <div class="flex items-center gap-3">
      <button
        (click)="onToggleSidebar()"
        class="p-2 rounded-lg text-gray-500 hover:text-gray-900 dark:hover:text-white
               hover:bg-gray-100 dark:hover:bg-gray-800 transition-all duration-150"
        aria-label="Toggle sidebar"
      >
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>

      <div class="hidden sm:flex items-center gap-2 text-sm">
        <span class="text-primary-500 font-semibold">Angular Academy</span>
        <svg class="w-3.5 h-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/>
        </svg>
        <span class="text-gray-500 dark:text-gray-400 text-xs">v21 · Standalone · Signals</span>
      </div>
    </div>

    <!-- Right: XP badge + Theme toggle -->
    <div class="flex items-center gap-2">

      <!-- XP / Level Badge -->
      <div
        class="hidden sm:flex items-center gap-1.5 px-3 py-1.5 rounded-full
               bg-primary-50 dark:bg-primary-900/20
               border border-primary-100 dark:border-primary-800/40"
      >
        <span class="text-xs">⚡</span>
        <span class="text-xs font-bold text-primary-600 dark:text-primary-400">
          Lv{{ level() }} · {{ totalXp() }} XP
        </span>
      </div>

      <!-- Theme toggle button -->
      <button
        (click)="toggleTheme()"
        class="p-2 rounded-lg text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white
               hover:bg-gray-100 dark:hover:bg-gray-800 transition-all duration-150"
        [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        @if (isDark()) {
          <svg class="w-5 h-5 text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707
                 M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
        } @else {
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        }
      </button>

    </div>
  </div>
</header>
