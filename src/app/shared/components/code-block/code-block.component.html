<div class="code-block-wrapper rounded-xl overflow-hidden border border-gray-800 shadow-lg my-4">

  <!-- ── Toolbar ─────────────────────────────────────────────── -->
  <div class="flex items-center justify-between px-4 py-2.5 bg-gray-900 border-b border-gray-800">
    <div class="flex items-center gap-3">
      <!-- Traffic-light dots -->
      <div class="flex gap-1.5">
        <div class="w-3 h-3 rounded-full bg-red-500/70"></div>
        <div class="w-3 h-3 rounded-full bg-yellow-500/70"></div>
        <div class="w-3 h-3 rounded-full bg-green-500/70"></div>
      </div>
      <!-- Filename / title -->
      @if (filename()) {
        <span class="text-gray-400 text-xs font-mono">{{ filename() }}</span>
      } @else if (title()) {
        <span class="text-gray-500 text-xs">{{ title() }}</span>
      }
    </div>

    <div class="flex items-center gap-2">
      <!-- Language badge -->
      <span class="text-xs text-gray-500 font-mono">{{ languageLabel() }}</span>

      <!-- Copy button -->
      <button
        (click)="copyCode()"
        class="flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-medium
               transition-all duration-200
               text-gray-400 hover:text-white hover:bg-gray-700"
        [class.text-green-400]="copied()"
        [class.hover:bg-transparent]="copied()"
      >
        @if (copied()) {
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
          </svg>
          <span>Copied!</span>
        } @else {
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
          <span>Copy</span>
        }
      </button>
    </div>
  </div>

  <!-- ── Code content ────────────────────────────────────────── -->
  <div class="relative bg-gray-950 overflow-x-auto">
    <pre class="p-5 text-sm leading-relaxed font-mono text-gray-300 min-w-0 whitespace-pre"><code [innerHTML]="highlightedCode()"></code></pre>
  </div>

</div>
